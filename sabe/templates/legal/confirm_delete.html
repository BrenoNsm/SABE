{% extends "base.html" %}
{% block title %}Confirmar Exclusão - SABE{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="bg-white rounded-lg shadow p-6 text-center">
        <h1 class="text-xl font-bold text-gray-800 mb-4">Confirmar Exclusão</h1>
        <p class="text-gray-600 mb-6">Tem certeza que deseja excluir <strong>{{ object.tipo_display }} - {{ object.numero }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="flex justify-center gap-3">
                <a href="{% url 'legal:list' %}" class="px-4 py-2 border border-gray-300 rounded-lg text-sm hover:bg-gray-50">Cancelar</a>
                <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700 transition">Confirmar Exclusão</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
