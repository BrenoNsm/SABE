{% extends "base.html" %}
{% load static %}

{% block title %}Login - SABE{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-tce-blue">SABE</h1>
            <p class="text-gray-600 text-sm mt-2">{{ APP_TITLE }}</p>
            <p class="text-xs text-gray-500 mt-1">{{ INSTITUTION }}</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            {% if form.errors %}
            <div class="bg-red-100 border border-red-200 text-red-800 px-4 py-3 rounded-lg text-sm">
                Usuário ou senha inválidos. Tente novamente.
            </div>
            {% endif %}

            <div>
                <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                <input type="text" name="username" id="id_username" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="Seu usuário">
            </div>

            <div>
                <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input type="password" name="password" id="id_password" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="Sua senha">
            </div>

            <button type="submit"
                    class="w-full bg-tce-blue text-white py-2 px-4 rounded-lg hover:bg-blue-800 transition font-medium">
                Entrar
            </button>
        </form>
    </div>
</div>
{% endblock %}
