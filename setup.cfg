[tool:pytest]
DJANGO_SETTINGS_MODULE = sabe.config.settings.development
python_files = tests.py test_*.py
testpaths = sabe tests
addopts = --reuse-db --nomigrations -v --cov=sabe --cov-report=term-missing --cov-report=html:htmlcov --cov-fail-under=90

[coverage:run]
source = sabe
omit = 
    */migrations/*
    */management/*
    sabe/config/settings/*
    manage.py
    conftest.py
    */tests/*
    */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __str__
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    self.assert
